{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

<!-- Page Header -->

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>Products</h2>


<a href="{% url 'add_product' %}">
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal" >
    + Add Product
    </button>
</a>


</div>


<!-- Search Bar -->

<form method="get">
<div class="mb-3">
<input type="text" class="form-control" placeholder="Search product by name or SKU" name="q" value="{{ request.GET.q }}">
</div>
</form>


<!-- Products Table -->

<div class="card">

<div class="card-body">

<table class="table table-hover">

<thead class="table-light">


{% if products|length > 0 %}
<tr>
<th>SKU</th>
<th>Product Name</th>
<th>Price</th>
<!-- <th>Stock</th> -->
<th>Actions</th>
</tr>

</thead>

<tbody>


{% for product in products %}
<tr>
<td>{{ product.sku }}</td>
<td>{{ product }}</td>
<td>{{ product.price }}</td>
<!-- <td>100</td> -->
<td>

<a href="{% url 'edit_product' product.sku %}">
    <button class="btn btn-sm btn-outline-primary">Edit</button>
</a>

<a href="{% url 'delete_product' product.sku %}"

   onclick="return confirm('Are you sure you want to delete this product?')">
    <button class="btn btn-sm btn-outline-danger">Delete</button>
</a>

</td>
</tr>

{% endfor %}

{% else %} 

<h2>No Product Found </h2>

{% endif %}


</tbody>

</table>

</div>

</div>

</div>




{% endblock %}
